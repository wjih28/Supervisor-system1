name: graduation_research_management
description: A new Flutter project for managing graduation research.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  supabase: ^2.0.0
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.1.10
  google_fonts: ^6.1.0
  intl: ^0.20.2
  file_picker: ^11.0.2
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    # Image assets directory
    - assets/images/

